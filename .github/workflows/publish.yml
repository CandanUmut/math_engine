# Publish — build sdist + wheel, then publish to PyPI via OIDC
# "Trusted Publishing" (no API token storage on GitHub).
#
# Trigger: pushing a git tag of the form `v*` (e.g. `v0.12.0`).
#
# One-time setup, by the maintainer (RELEASING.md has full details):
#
#   1. Create the project on PyPI: https://pypi.org/manage/account/publishing/
#      Add a "GitHub trusted publisher" with:
#        - PyPI Project Name: pru-math-engine
#        - Owner:             CandanUmut
#        - Repository name:   math_engine
#        - Workflow name:     publish.yml
#        - Environment name:  pypi
#   2. In this repo: Settings → Environments → New environment → name "pypi".
#      (No secrets needed — OIDC handles auth.)
#
# Per release:
#
#   git tag v0.12.0
#   git push origin v0.12.0
#
# That's it. This workflow builds, twine-checks, and uploads.
#
# To test the pipeline against TestPyPI before going to production,
# also configure a "testpypi" trusted publisher and a `testpypi`
# environment, and run the workflow manually with the `target` input.

name: publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      target:
        description: "PyPI repository (pypi or testpypi)"
        required: true
        default: pypi
        type: choice
        options: [pypi, testpypi]

jobs:
  test:
    name: gate (run tests before publishing)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package + test extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all,test]"

      - name: Run pytest
        env:
          OLLAMA_ENABLED: "false"
        run: pytest -q

  build:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade build twine

      - name: Verify tag matches pyproject version
        run: |
          tag="${GITHUB_REF#refs/tags/v}"
          pkg=$(python -c "import tomllib, pathlib; \
            print(tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'])")
          echo "tag=$tag pyproject=$pkg"
          if [ -n "$tag" ] && [ "$tag" != "$pkg" ]; then
            echo "ERROR: git tag v$tag != pyproject version $pkg"
            exit 1
          fi

      - name: Build sdist + wheel
        run: python -m build

      - name: Verify with twine
        run: twine check dist/*

      - name: Upload artefacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    # OIDC permissions required for Trusted Publishing.
    permissions:
      id-token: write

    # Use the `pypi` (or `testpypi`) environment configured in the repo
    # so PyPI's Trusted Publisher knows which workflow it's vouching for.
    environment:
      name: ${{ inputs.target || 'pypi' }}
      url: https://${{ inputs.target == 'testpypi' && 'test.pypi.org' || 'pypi.org' }}/p/pru-math-engine

    steps:
      - name: Download artefacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish to PyPI (Trusted Publisher)
        if: inputs.target != 'testpypi'
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Publish to TestPyPI (Trusted Publisher)
        if: inputs.target == 'testpypi'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
