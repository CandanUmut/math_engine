# CI — run the test suite on every push and pull request.
#
# This is the gate every release goes through; the publish workflow
# only fires when CI is green on the tag.

name: ci

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + test extras + Z3
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all,test]"

      - name: Sanity-check console scripts
        run: |
          pru-math --help || true            # arg parser still requires input
          pru-math 'Eq(x**2 - 4, 0)'
          pru-math-server --help

      - name: Run pytest
        env:
          OLLAMA_ENABLED: "false"
        run: pytest -q

      - name: Build sdist + wheel
        run: |
          pip install --upgrade build twine
          python -m build
          twine check dist/*

      - name: Upload build artefacts
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7
